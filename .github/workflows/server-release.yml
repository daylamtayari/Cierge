name: Server Release

on:
  push:
    tags:
      - "server/v[0-9]*.[0-9]*.[0-9]*"

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  build:
    name: "Build ${{ matrix.goos }}-${{ matrix.goarch }}"
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    strategy:
      fail-fast: true
      matrix:
        goos:
          - "linux"
          - "windows"
          - "darwin"
        goarch:
          - "amd64"
          - "arm64"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: server/go.mod
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "26"
      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9
        with:
          version: 10.33.0
      - name: "Build Frontend"
        working-directory: ./server/web
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: "Extract Version"
        id: version
        run: echo "value=${GITHUB_REF_NAME#server/}" >> $GITHUB_OUTPUT
      - name: "Go Build"
        if: ${{ matrix.goos != 'windows' }}
        working-directory: ./server
        run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -v -trimpath -ldflags="-X main.Version=${{ steps.version.outputs.value }}" -o ../cierge-${{ steps.version.outputs.value }}-${{ matrix.goos }}-${{ matrix.goarch }}
      - name: "Go Build Windows"
        if: ${{ matrix.goos == 'windows' }}
        working-directory: ./server
        run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -v -trimpath -ldflags="-X main.Version=${{ steps.version.outputs.value }}" -o ../cierge-${{ steps.version.outputs.value }}-${{ matrix.goos }}-${{ matrix.goarch }}.exe
      - name: "Upload Artifact"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cierge-${{ steps.version.outputs.value }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cierge-*
          if-no-files-found: error
          retention-days: 1

  release:
    name: "Create Release"
    runs-on: "ubuntu-latest"
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: "Generate Release Notes"
        id: changelog
        run: |
          PACKAGE="${GITHUB_REF_NAME%%/*}"
          PREV_TAG=$(git tag --sort=-version:refname | grep "^${PACKAGE}/v" | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" | grep "^${PACKAGE}:" | sed -E "s/^${PACKAGE}: ?/- /")
            HEADER=""
          else
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%s" | grep "^${PACKAGE}:" | sed -E "s/^${PACKAGE}: ?/- /")
            HEADER="**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${GITHUB_REF_NAME}"
          fi
          {
            echo 'notes<<EOF'
            [ -n "$HEADER" ] && printf '%s\n\n' "$HEADER"
            echo "$COMMITS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: "Download All Artifacts"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: release
          merge-multiple: true
      - name: "Generate Checksums"
        run: |
          cd release
          sha256sum cierge-* > SHA256SUMS
          md5sum cierge-* > MD5SUMS
      - name: "Create Release"
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: ./release/*

  docker:
    name: "Build and Push Docker Image"
    runs-on: "ubuntu-latest"
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: "Extract Version"
        id: version
        run: echo "value=${GITHUB_REF_NAME#server/}" >> $GITHUB_OUTPUT
      - name: "Set up QEMU"
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      - name: "Log in to GHCR"
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: "Extract Image Metadata"
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ghcr.io/daylamtayari/cierge/server
          tags: |
            type=match,pattern=server/v(.*),group=1
            type=raw,value=latest
            type=sha
      - name: "Build and Push"
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
